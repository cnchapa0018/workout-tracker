# GitHub CodeQL — deep static analysis for JavaScript/TypeScript.
# Free for public repositories; results land in Security → Code scanning.
name: CodeQL

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # weekly, Monday 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL Analyze (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}
          # security-extended adds higher-signal security queries on top of the default set.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
